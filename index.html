<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صندوق عائلة الرشيدان</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f0e6; color: #1a2a4a; padding-bottom: 70px; }
        .app { max-width: 500px; margin: 0 auto; background: #f5f0e6; min-height: 100vh; }
        .card { background: white; border: 1px solid #1a2a4a; border-radius: 15px; padding: 15px; margin: 10px; }
        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; }
        .btn-gold { background: #1a2a4a; color: white; }
        .btn-dark { background: #e8e0d0; border: 1px solid #1a2a4a; }
        input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #1a2a4a; margin-bottom: 10px; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1a2a4a; color: white; padding: 10px 20px; border-radius: 30px; z-index: 999; }
        .flex { display: flex; gap: 10px; }
        .flex button { flex: 1; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat { background: #f5f0e6; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #1a2a4a; }
    </style>
</head>
<body>
<div class="app">
    <div style="text-align:center; padding:20px; background:#e8e0d0; margin:10px; border-radius:30px;">
        <h1 style="color:#1a2a4a;">🏦 صندوق الرشيدان</h1>
        <p>ALRUSHAYDAN FAMILY FUND</p>
    </div>

    <div class="card">
        <h3>☁️ المزامنة السحابية</h3>
        <input type="text" id="apiUrl" placeholder="رابط Google Apps Script">
        <div class="flex">
            <button class="btn btn-gold" onclick="saveUrl()">💾 حفظ</button>
            <button class="btn btn-gold" onclick="syncToCloud()">📤 مزامنة للسحابة</button>
            <button class="btn btn-dark" onclick="syncFromCloud()">📥 تحميل من السحابة</button>
        </div>
        <div id="status" style="margin-top:10px; font-size:12px; text-align:center;"></div>
    </div>

    <div class="card">
        <h3>📊 الإحصائيات</h3>
        <div class="stats" id="stats">
            <div class="stat"><div>بند الطوارئ</div><div class="stat-value" id="emergencyBalance">0</div></div>
            <div class="stat"><div>إجمالي المُقرض</div><div class="stat-value" id="totalLent">0</div></div>
        </div>
    </div>
</div>

<script>
    let apiUrl = localStorage.getItem('apiUrl') || '';

    function saveUrl() {
        apiUrl = document.getElementById('apiUrl').value;
        localStorage.setItem('apiUrl', apiUrl);
        showMessage('✅ تم حفظ الرابط');
    }

    async function syncToCloud() {
        if (!apiUrl) { showMessage('❌ الرجاء إدخال رابط التطبيق'); return; }
        showMessage('⏳ جاري المزامنة...');
        
        let data = {
            emergencyBalance: 9988,
            totalLent: 139900,
            members: [],
            loans: []
        };
        
        try {
            let response = await fetch(apiUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            showMessage('✅ تمت المزامنة');
            document.getElementById('status').innerHTML = '✅ تم المزامنة';
        } catch(err) {
            showMessage('❌ خطأ: ' + err.message);
        }
    }

    async function syncFromCloud() {
        if (!apiUrl) { showMessage('❌ الرجاء إدخال رابط التطبيق'); return; }
        showMessage('⏳ جاري التحميل...');
        
        try {
            let response = await fetch(apiUrl);
            let data = await response.json();
            
            document.getElementById('emergencyBalance').innerHTML = (data.emergencyBalance || 9988).toLocaleString();
            document.getElementById('totalLent').innerHTML = (data.totalLent || 139900).toLocaleString();
            
            showMessage('✅ تم التحميل من السحابة');
            document.getElementById('status').innerHTML = '✅ تم التحميل';
        } catch(err) {
            showMessage('❌ خطأ: ' + err.message);
        }
    }

    function showMessage(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    document.getElementById('apiUrl').value = apiUrl;
</script>
</body>
</html>
